<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-label="A rocket ascending along a simulated flight trajectory">
  <defs>
    <linearGradient id="ht-line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#f8a84b"/>
      <stop offset="1" stop-color="#ffd38f"/>
    </linearGradient>
    <linearGradient id="ht-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe9c9"/>
      <stop offset="0.5" stop-color="#f0ab50"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="ht-flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4d6"/>
      <stop offset="0.5" stop-color="#ffd38f"/>
      <stop offset="1" stop-color="#f0ab50" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ht-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0ab50" stop-opacity="0.33"/>
      <stop offset="1" stop-color="#f0ab50" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- thrust glow hugging the rocket -->
  <circle cx="176" cy="112" r="52" fill="url(#ht-glow)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="40" cy="60" r="1.6" opacity="0.75"/>
    <circle cx="96" cy="34" r="1.1" opacity="0.55"/>
    <circle cx="330" cy="52" r="1.4" opacity="0.7"/>
    <circle cx="360" cy="104" r="1" opacity="0.5"/>
    <circle cx="150" cy="24" r="1.2" opacity="0.6"/>
    <circle cx="300" cy="150" r="1" opacity="0.45"/>
  </g>
  <g stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity="0.8">
    <path d="M64 132 h9 M68.5 127.5 v9"/>
    <path d="M348 168 h7 M351.5 164.5 v7"/>
  </g>

  <!-- ground / launch site -->
  <path d="M28 288 Q140 300 372 280" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
  <rect x="44" y="278" width="34" height="7" rx="2" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="61" cy="281" r="4" fill="#f8a84b"/>

  <!-- trajectory -->
  <path d="M61 281 C 120 150, 200 44, 360 150" fill="none"
        stroke="url(#ht-line)" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="2 9"/>

  <!-- rocket, riding the ascending arc -->
  <g transform="translate(174,108) rotate(48)">
    <path d="M0 -34 C 8 -24, 9 -8, 9 2 L 9 16 C 9 20, 5 22, 0 22 C -5 22, -9 20, -9 16 L -9 2 C -9 -8, -8 -24, 0 -34 Z" fill="url(#ht-body)"/>
    <path d="M-9 6 L -20 22 L -9 18 Z" fill="#b45309"/>
    <path d="M9 6 L 20 22 L 9 18 Z" fill="#b45309"/>
    <circle cx="0" cy="-8" r="4.6" fill="#0b1a3a"/>
    <circle cx="0" cy="-8" r="2.6" fill="#7fd4ff"/>
    <path d="M-6 22 C -4 34, 0 42, 0 42 C 0 42, 4 34, 6 22 Z" fill="url(#ht-flame)"/>
  </g>
</svg>
