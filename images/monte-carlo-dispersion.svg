<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-label="Monte Carlo impact dispersion with a confidence ellipse around a target">
  <defs>
    <radialGradient id="mc-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="208" cy="172" r="120" fill="url(#mc-glow)"/>

  <!-- target rings -->
  <g fill="none" stroke="#c084fc">
    <circle cx="208" cy="172" r="104" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="208" cy="172" r="74" stroke-opacity="0.28" stroke-width="2"/>
    <circle cx="208" cy="172" r="44" stroke-opacity="0.4" stroke-width="2"/>
  </g>

  <!-- confidence ellipse -->
  <g transform="translate(208 172) rotate(-22)">
    <ellipse rx="98" ry="60" fill="#a855f7" fill-opacity="0.06" stroke="#c084fc" stroke-opacity="0.75" stroke-width="2.4" stroke-dasharray="7 6"/>
    <ellipse rx="56" ry="34" fill="none" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1.6" stroke-dasharray="4 5"/>
  </g>

  <!-- axes -->
  <g stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.4">
    <line x1="60" y1="172" x2="356" y2="172"/>
    <line x1="208" y1="44" x2="208" y2="300"/>
  </g>

  <!-- impact scatter -->
  <g fill="#e9d5ff">
    <circle cx="196" cy="150" r="3" opacity="0.9"/>
    <circle cx="224" cy="164" r="3.2" opacity="0.85"/>
    <circle cx="210" cy="182" r="3" opacity="0.9"/>
    <circle cx="188" cy="176" r="2.8" opacity="0.8"/>
    <circle cx="238" cy="150" r="2.8" opacity="0.8"/>
    <circle cx="176" cy="160" r="2.6" opacity="0.7"/>
    <circle cx="228" cy="190" r="2.8" opacity="0.75"/>
    <circle cx="202" cy="204" r="2.6" opacity="0.7"/>
    <circle cx="252" cy="176" r="2.6" opacity="0.65"/>
    <circle cx="164" cy="184" r="2.4" opacity="0.6"/>
    <circle cx="216" cy="138" r="2.6" opacity="0.7"/>
    <circle cx="244" cy="200" r="2.4" opacity="0.55"/>
    <circle cx="152" cy="150" r="2.2" opacity="0.5"/>
    <circle cx="270" cy="158" r="2.2" opacity="0.5"/>
    <circle cx="190" cy="220" r="2.2" opacity="0.5"/>
    <circle cx="132" cy="176" r="2" opacity="0.4"/>
    <circle cx="286" cy="192" r="2" opacity="0.4"/>
    <circle cx="232" cy="120" r="2" opacity="0.4"/>
  </g>

  <!-- mean marker -->
  <g>
    <circle cx="208" cy="172" r="5.5" fill="#f0ab50"/>
    <line x1="192" y1="172" x2="224" y2="172" stroke="#ffd38f" stroke-width="2" stroke-linecap="round"/>
    <line x1="208" y1="156" x2="208" y2="188" stroke="#ffd38f" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="66" cy="66" r="1.4" opacity="0.55"/>
    <circle cx="340" cy="80" r="1.4" opacity="0.55"/>
    <circle cx="320" cy="270" r="1.2" opacity="0.45"/>
  </g>
</svg>
