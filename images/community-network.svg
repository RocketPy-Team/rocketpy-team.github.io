<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-label="A connected network of contributors around a central hub">
  <defs>
    <radialGradient id="cn-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cn-hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <circle cx="200" cy="162" r="120" fill="url(#cn-glow)"/>

  <!-- connections -->
  <g stroke="#60a5fa" stroke-opacity="0.4" stroke-width="1.6">
    <line x1="200" y1="162" x2="96" y2="86"/>
    <line x1="200" y1="162" x2="312" y2="92"/>
    <line x1="200" y1="162" x2="70" y2="200"/>
    <line x1="200" y1="162" x2="326" y2="212"/>
    <line x1="200" y1="162" x2="150" y2="266"/>
    <line x1="200" y1="162" x2="262" y2="262"/>
    <line x1="96" y1="86" x2="312" y2="92" stroke-opacity="0.18"/>
    <line x1="70" y1="200" x2="150" y2="266" stroke-opacity="0.18"/>
    <line x1="326" y1="212" x2="262" y2="262" stroke-opacity="0.18"/>
    <line x1="312" y1="92" x2="326" y2="212" stroke-opacity="0.18"/>
  </g>

  <!-- outer nodes -->
  <g>
    <g transform="translate(96 86)"><circle r="16" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/><circle cy="-4" r="4.5" fill="#bfdbfe"/><path d="M-7 8 a7 6 0 0 1 14 0 Z" fill="#bfdbfe"/></g>
    <g transform="translate(312 92)"><circle r="16" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/><circle cy="-4" r="4.5" fill="#bfdbfe"/><path d="M-7 8 a7 6 0 0 1 14 0 Z" fill="#bfdbfe"/></g>
    <g transform="translate(70 200)"><circle r="15" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/><circle cy="-4" r="4.2" fill="#bfdbfe"/><path d="M-6.5 7.5 a6.5 5.5 0 0 1 13 0 Z" fill="#bfdbfe"/></g>
    <g transform="translate(326 212)"><circle r="15" fill="#7c2d12" stroke="#f0ab50" stroke-width="2"/><circle cy="-4" r="4.2" fill="#ffe9c9"/><path d="M-6.5 7.5 a6.5 5.5 0 0 1 13 0 Z" fill="#ffe9c9"/></g>
    <g transform="translate(150 266)"><circle r="14" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/><circle cy="-3.5" r="4" fill="#bfdbfe"/><path d="M-6 7 a6 5 0 0 1 12 0 Z" fill="#bfdbfe"/></g>
    <g transform="translate(262 262)"><circle r="14" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/><circle cy="-3.5" r="4" fill="#bfdbfe"/><path d="M-6 7 a6 5 0 0 1 12 0 Z" fill="#bfdbfe"/></g>
  </g>

  <!-- central hub -->
  <g transform="translate(200 162)">
    <circle r="30" fill="url(#cn-hub)" stroke="#dbeafe" stroke-opacity="0.6" stroke-width="2"/>
    <circle cy="-8" r="8" fill="#ffffff"/>
    <path d="M-13 16 a13 11 0 0 1 26 0 Z" fill="#ffffff"/>
  </g>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="44" cy="52" r="1.4" opacity="0.55"/>
    <circle cx="360" cy="150" r="1.3" opacity="0.5"/>
    <circle cx="210" cy="300" r="1.2" opacity="0.45"/>
  </g>
</svg>
