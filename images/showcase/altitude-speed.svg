<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-label="Altitude and velocity plotted against time, peaking at apogee">
  <defs>
    <linearGradient id="as-alt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f8a84b"/>
      <stop offset="1" stop-color="#ffd38f"/>
    </linearGradient>
    <linearGradient id="as-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0ab50" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#f0ab50" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="52" cy="40" r="1.3" opacity="0.6"/>
    <circle cx="330" cy="36" r="1.4" opacity="0.6"/>
    <circle cx="290" cy="70" r="1" opacity="0.4"/>
  </g>

  <!-- gridlines -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1">
    <line x1="54" y1="210" x2="364" y2="210"/>
    <line x1="54" y1="154" x2="364" y2="154"/>
    <line x1="54" y1="98" x2="364" y2="98"/>
  </g>

  <!-- axes -->
  <g stroke="#ffffff" stroke-opacity="0.24" stroke-width="1.6" stroke-linecap="round">
    <line x1="54" y1="44" x2="54" y2="266"/>
    <line x1="54" y1="266" x2="366" y2="266"/>
  </g>

  <!-- altitude area + curve -->
  <path d="M54 266 C 110 150, 150 72, 206 58 C 262 72, 330 132, 360 172 L 360 266 L 54 266 Z" fill="url(#as-fill)"/>
  <path d="M54 266 C 110 150, 150 72, 206 58 C 262 72, 330 132, 360 172"
        fill="none" stroke="url(#as-alt)" stroke-width="3.4" stroke-linecap="round"/>

  <!-- velocity curve -->
  <path d="M54 266 C 74 150, 88 124, 100 120 C 140 112, 180 220, 206 250 C 250 240, 320 236, 360 242"
        fill="none" stroke="#2dd4bf" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="1 7" opacity="0.9"/>

  <!-- apogee marker -->
  <g>
    <circle cx="206" cy="58" r="5" fill="#f0ab50"/>
    <line x1="192" y1="58" x2="220" y2="58" stroke="#ffd38f" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="206" y1="44" x2="206" y2="72" stroke="#ffd38f" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- legend swatches -->
  <g>
    <rect x="286" y="52" width="16" height="4" rx="2" fill="url(#as-alt)"/>
    <circle cx="290" cy="72" r="2.4" fill="#2dd4bf"/>
    <circle cx="296" cy="72" r="2.4" fill="#2dd4bf"/>
  </g>
</svg>
