<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-label="A three-dimensional flight trajectory arcing over a ground grid toward a landing dispersion">
  <defs>
    <linearGradient id="f3-line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#f8a84b"/>
      <stop offset="1" stop-color="#ffd38f"/>
    </linearGradient>
    <radialGradient id="f3-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0ab50" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#f0ab50" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- planetary curvature -->
  <path d="M0 96 Q 200 58 400 96" fill="none" stroke="#7fd4ff" stroke-opacity="0.16" stroke-width="2"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="48" cy="44" r="1.4" opacity="0.6"/>
    <circle cx="118" cy="30" r="1" opacity="0.45"/>
    <circle cx="330" cy="40" r="1.4" opacity="0.6"/>
    <circle cx="360" cy="82" r="1" opacity="0.4"/>
    <circle cx="250" cy="26" r="1.1" opacity="0.5"/>
  </g>

  <!-- ground grid (perspective) -->
  <g stroke="#2dd4bf" stroke-opacity="0.34" stroke-width="1.3">
    <line x1="56" y1="272" x2="356" y2="272"/>
    <line x1="126" y1="214" x2="286" y2="214"/>
    <line x1="79" y1="253" x2="333" y2="253"/>
    <line x1="102" y1="234" x2="310" y2="234"/>
    <line x1="56" y1="272" x2="126" y2="214"/>
    <line x1="131" y1="272" x2="166" y2="214"/>
    <line x1="206" y1="272" x2="206" y2="214"/>
    <line x1="281" y1="272" x2="246" y2="214"/>
    <line x1="356" y1="272" x2="286" y2="214"/>
  </g>

  <!-- launch glow + pad -->
  <circle cx="150" cy="262" r="34" fill="url(#f3-glow)"/>
  <circle cx="150" cy="262" r="4.4" fill="#f8a84b"/>

  <!-- landing dispersion ellipse -->
  <ellipse cx="300" cy="240" rx="24" ry="8" fill="#f0ab50" fill-opacity="0.08"
           stroke="#ffd38f" stroke-opacity="0.7" stroke-width="1.8" stroke-dasharray="5 5"/>
  <circle cx="300" cy="240" r="3" fill="#ffd38f"/>

  <!-- 3D trajectory -->
  <path d="M150 262 C 175 150, 215 80, 250 66 C 285 80, 300 170, 300 240"
        fill="none" stroke="url(#f3-line)" stroke-width="3.2" stroke-linecap="round"
        stroke-dasharray="2 8"/>

  <!-- apex marker -->
  <circle cx="250" cy="66" r="4.4" fill="#ffd38f"/>
</svg>
