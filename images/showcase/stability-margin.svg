<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-label="Static stability margin over time staying inside the stable band">
  <defs>
    <linearGradient id="sm-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f8a84b"/>
      <stop offset="1" stop-color="#ffd38f"/>
    </linearGradient>
  </defs>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="60" cy="42" r="1.3" opacity="0.55"/>
    <circle cx="336" cy="52" r="1.3" opacity="0.55"/>
    <circle cx="300" cy="34" r="1" opacity="0.4"/>
  </g>

  <!-- stable band -->
  <rect x="54" y="120" width="312" height="70" fill="#2dd4bf" fill-opacity="0.09"/>
  <g stroke="#2dd4bf" stroke-opacity="0.5" stroke-width="1.4" stroke-dasharray="6 6">
    <line x1="54" y1="120" x2="366" y2="120"/>
    <line x1="54" y1="190" x2="366" y2="190"/>
  </g>

  <!-- axes -->
  <g stroke="#ffffff" stroke-opacity="0.24" stroke-width="1.6" stroke-linecap="round">
    <line x1="54" y1="44" x2="54" y2="266"/>
    <line x1="54" y1="266" x2="366" y2="266"/>
  </g>

  <!-- margin curve: dips low at ignition, climbs into the stable band, settles -->
  <path d="M54 232 C 80 205, 96 158, 120 150 C 170 138, 210 156, 260 148 C 300 143, 340 150, 360 150"
        fill="none" stroke="url(#sm-line)" stroke-width="3.4" stroke-linecap="round"/>

  <!-- marker where it enters the stable band -->
  <circle cx="120" cy="150" r="4.6" fill="#f0ab50"/>
  <circle cx="120" cy="150" r="8" fill="none" stroke="#f0ab50" stroke-opacity="0.35" stroke-width="2"/>

  <!-- end point -->
  <circle cx="360" cy="150" r="3.6" fill="#ffd38f"/>
</svg>
